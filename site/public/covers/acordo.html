<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acordo de Preços — Cover</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#FAFBFD;font-family:'Space Grotesk',Arial,sans-serif;height:100%}
  @keyframes balloonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}
  @keyframes sparkleFlash{0%{opacity:0;transform:scale(.3) rotate(-8deg)}35%{opacity:1;transform:scale(1.15) rotate(3deg)}100%{opacity:0;transform:scale(.9) rotate(0deg)}}
  .cover-card{position:relative;width:100%;height:100%;overflow:hidden;background:radial-gradient(90% 90% at 8% 12%,#FDBA74 0%,rgba(253,186,116,0) 60%),radial-gradient(100% 100% at 92% 18%,#FCD9B6 0%,rgba(252,217,182,0) 55%),radial-gradient(110% 110% at 85% 95%,#7BE0C2 0%,rgba(123,224,194,0) 60%),radial-gradient(120% 120% at 15% 92%,#86EFAC 0%,rgba(134,239,172,0) 60%),linear-gradient(120deg,#FFEBD6 0%,#F3F7E9 50%,#E6F7EE 100%);container-type:size;cursor:pointer}
  .cover-shot{position:absolute;top:6%;left:6%;right:6%;bottom:0;border-radius:1cqw 1cqw 0 0;overflow:hidden;box-shadow:0 1.2cqw 2.6cqw rgba(20,30,50,.2)}
  .cover-shot img{display:block;width:100%;height:100%;object-fit:cover;object-position:top center;transition:filter .35s ease}
  .cover-shot img.blurred{filter:blur(4px)}
  .balloon{position:absolute;white-space:nowrap;pointer-events:none;font-family:'Space Grotesk',Arial,sans-serif;border-radius:999px;padding:9px 18px;font-size:15px}
  .mat{background:#FFFFFF;border:0.5px solid #E6E9ED;color:#1A1A1A;font-weight:500;box-shadow:0 4px 12px rgba(20,30,50,.1);z-index:2;transition:left .55s cubic-bezier(.2,.6,.2,1),top .55s cubic-bezier(.2,.6,.2,1),opacity .3s ease,transform .3s ease}
  .res{background:#22C55E;border:0.5px solid #22C55E;color:#fff;font-weight:600;box-shadow:0 6px 16px rgba(20,30,50,.18);z-index:3;transition:left .3s cubic-bezier(.2,.6,.2,1),top .3s cubic-bezier(.2,.6,.2,1),opacity .3s ease .1s,transform .35s cubic-bezier(.34,1.56,.64,1) .1s,filter .35s ease}
  .sparkle{position:absolute;width:1px;height:1px;pointer-events:none;z-index:4;opacity:0}
  .ray{position:absolute;left:0;top:0;width:2px;height:8px;background:#7BE0C2;border-radius:1px;transform-origin:0 0}
  .check{position:absolute;left:50%;top:50%;z-index:5;pointer-events:none;display:flex;align-items:center;gap:1.2cqw;background:#fff;border-radius:999px;padding:1cqw 2.4cqw 1cqw 1cqw;box-shadow:0 1cqw 2.2cqw rgba(20,30,50,.22);opacity:0;transform:translate(-50%,-50%) scale(.7);transition:opacity .35s ease,transform .4s cubic-bezier(.34,1.56,.64,1)}
  .check .circle{position:relative;width:4.8cqw;height:4.8cqw;border-radius:50%;background:#22C55E;flex-shrink:0}
  .check .glyph{position:absolute;left:50%;top:46%;width:34%;height:55%;transform:translate(-50%,-60%) rotate(45deg);border-bottom:1.7px solid #fff;border-right:1.7px solid #fff}
  .check .txt{font-weight:700;color:#1A1A1A;font-size:2.4cqw;white-space:nowrap}
img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;pointer-events:none}
*{-webkit-tap-highlight-color:transparent}
</style>

    <div class="balloon res" data-r="1">Pedido 2 gerado!</div>
    <div class="balloon res" data-r="2">Pedido urgente gerado!</div>

    <div class="check" id="check">
      <div class="circle"><div class="glyph"></div></div>
      <span class="txt">Obra sem atraso!</span>
    </div>
  </div>

<script>
(function(){
  var CENTER = 50;
  var idlePos = [{x:23.5,y:29.5},{x:73.5,y:23.5},{x:25.5,y:75.5},{x:77.5,y:71.5}];
  var resultData = [
    {dx:-14,dy:-8,side:'left'},
    {dx:14,dy:8,side:'right'},
    {dx:0,dy:24,side:'bottom'}
  ];
  var rayAngles = {left:[-85,-45,-5],right:[5,45,85],bottom:[155,180,205]};

  var card = document.getElementById('card');
  var check = document.getElementById('check');
  var shotImg = card.querySelector('.cover-shot img');
  var mats = Array.prototype.slice.call(card.querySelectorAll('.balloon.mat'));
  var reses = Array.prototype.slice.call(card.querySelectorAll('.balloon.res'));
  var sparkles = Array.prototype.slice.call(card.querySelectorAll('.sparkle'));

  // build rays inside sparkles
  sparkles.forEach(function(sp, i){
    var side = resultData[i].side;
    rayAngles[side].forEach(function(a){
      var r = document.createElement('div');
      r.className = 'ray';
      r.style.transform = 'rotate('+a+'deg) translateY(-9px)';
      sp.appendChild(r);
    });
  });

  var hover = false, merged = false, showCheck = false;
  var t1 = null, t2 = null;

  function update(){
    // material balloons
    mats.forEach(function(el,i){
      var idle = idlePos[i];
      var left = hover ? CENTER : idle.x;
      var top  = hover ? CENTER : idle.y;
      el.style.left = left + '%';
      el.style.top = top + '%';
      el.style.transform = merged ? 'scale(.3)' : 'scale(1)';
      el.style.opacity = merged ? 0 : 1;
      if (hover || merged){ el.style.animation = 'none'; }
      else { el.style.animation = 'balloonFloat 3.2s ease-in-out infinite'; el.style.animationDelay = (i*0.4)+'s'; }
    });
    // result balloons
    reses.forEach(function(el,i){
      var off = resultData[i];
      el.style.left = (CENTER + off.dx) + '%';
      el.style.top = (CENTER + off.dy) + '%';
      el.style.transform = merged ? 'scale(1)' : 'scale(.3)';
      el.style.opacity = !merged ? 0 : (showCheck ? 0.45 : 1);
      el.style.filter = showCheck ? 'blur(3px)' : 'none';
    });
    // sparkles
    sparkles.forEach(function(sp,i){
      var off = resultData[i];
      var soff = off.side==='left' ? -6 : off.side==='right' ? 130 : 55;
      sp.style.left = 'calc(' + (CENTER+off.dx) + '% + ' + soff + 'px)';
      sp.style.top  = 'calc(' + (CENTER+off.dy) + '% - 6px)';
      if (merged){ sp.style.opacity = 1; sp.style.animation = 'sparkleFlash .7s ease-out .15s forwards'; }
      else { sp.style.opacity = 0; sp.style.animation = 'none'; }
    });
    // check widget
    check.style.opacity = showCheck ? 1 : 0;
    check.style.transform = showCheck ? 'translate(-50%,-50%) scale(1)' : 'translate(-50%,-50%) scale(.7)';
    // screenshot blur
    if (showCheck){ shotImg.classList.add('blurred'); } else { shotImg.classList.remove('blurred'); }
  }

  card.addEventListener('mouseenter', function(){
    clearTimeout(t1); clearTimeout(t2);
    hover = true; merged = false; showCheck = false; update();
    t1 = setTimeout(function(){ merged = true; update(); }, 600);
    t2 = setTimeout(function(){ showCheck = true; update(); }, 1300);
  });
  card.addEventListener('mouseleave', function(){
    clearTimeout(t1); clearTimeout(t2);
    hover = false; merged = false; showCheck = false; update();
  });

  update();
})();
</script>
<script>(function(){var card=document.getElementById('card');if(!card)return;var mo=new MutationObserver(function(){if(card.classList.contains('is-anim'))card.dispatchEvent(new Event('mouseenter'));else card.dispatchEvent(new Event('mouseleave'));});mo.observe(card,{attributes:true,attributeFilter:['class']});})();</script>
</body>
</html>
