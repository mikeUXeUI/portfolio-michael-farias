<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design System para IA — Cover</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#FAFBFD;font-family:'Space Grotesk',Arial,sans-serif;height:100%}
  @keyframes badgeRainbowFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes dashedPulse{0%{opacity:1;transform:scale(1)}40%{opacity:.55;transform:scale(1.018)}100%{opacity:0;transform:scale(1)}}
  @keyframes aiGradientShift{0%{background-position:0 0,0% 0}100%{background-position:0 0,200% 0}}
  .cover-card{position:relative;width:100%;height:100%;overflow:hidden;background:#F1F3F6;container-type:size;cursor:pointer}
  .ds-grid{position:absolute;inset:8%;display:grid;grid-template-columns:1fr 1.5fr 2.2fr;grid-template-rows:1fr 1fr 1fr;gap:4.8% 3%}
  .ds-card{background:#fff;border:0.5px solid #E6E9ED;border-radius:2cqw;min-width:0;min-height:0}
  .c-topleft{grid-column:1/3;grid-row:1}
  .c-right{grid-column:3;grid-row:1/3}
  .c-small{grid-column:1;grid-row:2}
  .c-botsmall{grid-column:1;grid-row:3}
  .c-botwide{grid-column:2/4;grid-row:3}
  .c-highlight{grid-column:2;grid-row:2;position:relative;background:#fff;border-radius:2cqw;min-width:0;min-height:0}
  .badge{position:absolute;left:53.2%;top:33.3%;width:12%;aspect-ratio:1/1;transform:translate(-50%,-50%);border-radius:26% 26% 26% 10%;background:repeating-linear-gradient(120deg,#4C7EF3 0%,#9D6BEA 25%,#E17FE3 50%,#9D6BEA 75%,#4C7EF3 100%);background-size:300% 300%;animation:badgeRainbowFlow 5s linear infinite;display:flex;align-items:center;justify-content:center;transition:transform .5s cubic-bezier(.2,.6,.2,1);z-index:2}
  .cover-card:hover .badge{transform:translate(-50%,-50%) scale(1.08)}
  .sp{position:absolute;background:#fff;clip-path:polygon(50% 0%,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0% 50%,39% 39%)}
  .sp-big{left:50%;top:50%;width:44%;aspect-ratio:1/1;transform:translate(-50%,-50%)}
  .sp-s1{left:76%;top:32%;width:20%;aspect-ratio:1/1;transform:translate(-50%,-50%)}
  .sp-s2{left:72%;top:80%;width:15%;aspect-ratio:1/1;transform:translate(-50%,-50%)}
  .dashed{position:absolute;inset:0;border-radius:2cqw;pointer-events:none;border:2.5px dashed #5B8DEF;opacity:1;transition:opacity .3s ease}
  .rainbow{position:absolute;inset:0;border-radius:2cqw;pointer-events:none;border:2.5px solid transparent;background-image:linear-gradient(#fff,#fff),linear-gradient(90deg,#5B8DEF,#9D6BEA,#EA6FA8,#F4C04E,#5B8DEF);background-origin:border-box;background-clip:padding-box,border-box;background-size:100% 100%,100% 100%;background-position:0 0,0% 0%;opacity:0;transition:opacity .25s ease}
  .cover-card:hover .dashed{animation:dashedPulse .45s ease-out forwards}
  .cover-card:hover .rainbow{opacity:1;background-size:100% 100%,300% 100%;animation:aiGradientShift 2.2s linear infinite;box-shadow:0 0 14px rgba(157,107,234,.3);transition:opacity .35s ease .1s}
img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;pointer-events:none}
*{-webkit-tap-highlight-color:transparent}

/* mobile autoplay (parent alterna .is-anim) */
.cover-card.is-anim .badge{transform:translate(-50%,-50%) scale(1.08)}.cover-card.is-anim .dashed{animation:dashedPulse .45s ease-out forwards}.cover-card.is-anim .rainbow{opacity:1;background-size:100% 100%,300% 100%;animation:aiGradientShift 2.2s linear infinite;box-shadow:0 0 14px rgba(157,107,234,.3);transition:opacity .35s ease .1s}
</style>
</head>
<body>
  <div class="cover-card">
    <div class="ds-grid">
      <div class="ds-card c-topleft"></div>
      <div class="ds-card c-right"></div>
      <div class="badge">
        <div class="sp sp-big"></div>
        <div class="sp sp-s1"></div>
        <div class="sp sp-s2"></div>
      </div>
      <div class="ds-card c-small"></div>
      <div class="c-highlight">
        <div class="dashed"></div>
        <div class="rainbow"></div>
      </div>
      <div class="ds-card c-botsmall"></div>
      <div class="ds-card c-botwide"></div>
    </div>
  </div>
</body>
</html>
