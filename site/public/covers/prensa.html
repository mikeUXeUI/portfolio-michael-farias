<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prensa — Cover</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#B8EAA7;font-family:'Space Grotesk',Arial,sans-serif}
  .cover-card{position:relative;width:100%;height:100%;overflow:hidden;background:#B8EAA7;container-type:inline-size;cursor:pointer}
  .word{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;font-family:Georgia,'Times New Roman',serif;font-weight:700;color:#13180F;font-size:40cqw;line-height:1;letter-spacing:-.02em;white-space:nowrap;z-index:1;will-change:transform;transition:transform .5s cubic-bezier(.2,.6,.2,1)}
  .devices{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);width:76%;z-index:2}
  .laptop{width:80%;margin-left:auto;border:0.3cqw solid #15171C;border-radius:1cqw;overflow:hidden;background:#15171C;display:block}
  .laptop img{display:block;width:100%}
  .phone{position:absolute;left:1%;bottom:-7%;width:19%;aspect-ratio:9/19;border:0.3cqw solid #15171C;border-radius:2.2cqw;overflow:hidden;background:#15171C}
  .phone img{display:block;width:100%;height:100%;object-fit:cover;object-position:top center}
  .cover-card:hover .word{transform:translate(-50%,-50%) scale(1.12)}
  @media(prefers-reduced-motion:reduce){.word{transition:none}.cover-card:hover .word{transform:translate(-50%,-50%)}}
img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;pointer-events:none}
*{-webkit-tap-highlight-color:transparent}

/* mobile autoplay (parent alterna .is-anim) */
.cover-card.is-anim .word{transform:translate(-50%,-50%) scale(1.12)}
</style>
</head>
<body>
  <div class="cover-card">
    <p class="word">Prensa</p>
    <div class="devices">
      <div class="laptop"><img src="imagens/10-publicacoes-desktop.png" alt=""></div>
      <div class="phone"><img src="imagens/09-publicacoes-mobile.png" alt=""></div>
    </div>
  </div>
</body>
</html>
